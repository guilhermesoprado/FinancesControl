services:
  postgres:
    image: postgres:16
    container_name: financemanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financemanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - financemanager-postgres-data:/var/lib/postgresql/data

volumes:
  financemanager-postgres-data:
